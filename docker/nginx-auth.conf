server {
    listen 80;
    server_name localhost;

    location /w/api.php {
        auth_basic "SequentTest Wiki";
        auth_basic_user_file /etc/nginx/.htpasswd;

        # Also accept Bearer token as alternative to basic auth
        set $auth_token $http_authorization;
        if ($http_authorization ~ "^Bearer\s+(.+)$") {
            set $auth_token "ok";
        }
        if ($auth_token = "ok") {
            auth_basic off;
        }

        proxy_pass http://mediawiki:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api.php {
        auth_basic "SequentTest Wiki";
        auth_basic_user_file /etc/nginx/.htpasswd;

        set $auth_token $http_authorization;
        if ($http_authorization ~ "^Bearer\s+(.+)$") {
            set $auth_token "ok";
        }
        if ($auth_token = "ok") {
            auth_basic off;
        }

        proxy_pass http://mediawiki:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://mediawiki:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
