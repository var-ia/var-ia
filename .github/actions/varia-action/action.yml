name: Varia — Wikipedia Edit History Analysis
description: Analyze Wikipedia page edit history deterministically. Run on PRs to detect claim/source changes in referenced articles.
author: NextConsensus
branding:
  icon: book-open
  color: blue

inputs:
  pages:
    description: "Page titles to analyze, one per line"
    required: true
  depth:
    description: "Analysis depth (quick, brief, detailed, forensic)"
    required: false
    default: "brief"
  api:
    description: "MediaWiki API base URL"
    required: false
  since:
    description: "Only report changes since this ISO timestamp"
    required: false
  format:
    description: "Output format (table, json, markdown-comment)"
    required: false
    default: "table"
  api-key:
    description: "Bearer token for authenticated MediaWiki instances"
    required: false
  api-user:
    description: "Username for basic auth"
    required: false
  api-password:
    description: "Password for basic auth"
    required: false

outputs:
  new-events:
    description: "Number of new events detected"
  report:
    description: "Analysis report as JSON"

runs:
  using: node20
  main: dist/index.js
