name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun x biome ci packages/
      - run: bun run typecheck
      - run: bun run check:boundaries
      - run: bun run test
