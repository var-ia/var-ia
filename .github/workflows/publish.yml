name: Publish Packages

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun test

      - name: Publish packages
        run: |
          for pkg in packages/evidence-graph packages/ingestion packages/analyzers packages/interpreter packages/cli; do
            echo "Publishing $pkg..."
            cd $pkg
            bun publish --access public --no-git-checks
            cd $OLDPWD
          done
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
